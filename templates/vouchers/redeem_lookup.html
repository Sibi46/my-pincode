{% extends 'base.html' %}
{% block title %}Redeem Voucher – MYPINCOD{% endblock %}

{% block extra_css %}
<style>
.rl-wrap{max-width:480px;margin:3rem auto;padding:0 1rem 3rem}
.rl-card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);padding:2rem 1.5rem;text-align:center}
.rl-icon{font-size:2.8rem;margin-bottom:.75rem}
.rl-card h2{margin:0 0 .4rem;font-size:1.2rem;font-weight:900;color:#111}
.rl-card p{font-size:.85rem;color:#6b7280;margin-bottom:1.5rem}
.code-input{width:100%;padding:.75rem 1rem;border:2px solid #d1d5db;border-radius:10px;font-size:1.1rem;font-weight:700;letter-spacing:.1em;text-align:center;text-transform:uppercase;box-sizing:border-box;transition:border-color .15s;font-family:monospace}
.code-input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.btn-search{display:block;width:100%;padding:.8rem;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:.75rem;transition:background .15s}
.btn-search:hover{background:#6d28d9}
.error-box{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:.65rem 1rem;font-size:.85rem;margin-bottom:1rem;text-align:left}
</style>
{% endblock %}

{% block content %}
<div class="rl-wrap">
  <div class="rl-card">
    <div class="rl-icon">🔍</div>
    <h2>Redeem Gift Voucher</h2>
    <p>Enter the voucher code shown by the customer</p>

    {% if error %}
    <div class="error-box"><i class="fas fa-times-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="text" name="voucher_code" class="code-input" placeholder="GIFT-XXXXXXXX" maxlength="20" autofocus>
      <button type="submit" class="btn-search"><i class="fas fa-search"></i> Find Voucher</button>
    </form>
  </div>
</div>
{% endblock %}
